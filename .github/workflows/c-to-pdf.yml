name: Generate PDFs from C Files

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.c'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.c'
  workflow_dispatch: # Allows you to trigger the action manually from the Actions tab

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf qpdf
          pip install Pygments

      - name: Make script executable
        run: chmod +x .github/scripts/generate_pdfs.sh

      - name: Run conversion script
        env:
          TARGET_FOLDER: "workspace" 
        run: .github/scripts/generate_pdfs.sh

      - name: Commit and Push PDFs
        run: |
          # 1. Configure git as the official GitHub Actions bot
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. Stage the generated PDFs
          git add output_pdfs/
          
          # 3. Commit and push ONLY if there are actual changes
          # This prevents the workflow from failing if you just updated a README
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-generate syntax highlighted PDFs"
            git push
            echo "Successfully pushed new PDFs to the repository."
          else
            echo "No PDF changes detected. Skipping commit."
          fi
